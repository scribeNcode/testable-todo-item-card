<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Todo Card</title>
  </head>
  <body>
    <div class="app-title"><h1>Todo App</h1></div>
    <article id="article-el" class="app-wrapper" data-testid="test-todo-card">
      <div class="card-header-section">
        <div class="card-header-title-wrapper">
          <h2 id="project-title" data-testid="test-todo-title">
            Finalize Project
          </h2>
        </div>
        <div class="card-header-icons-wrapper">
          <button
            id="edit-btn"
            data-testid="test-todo-edit-button"
            aria-label="Edit task"
          >
            ✏️
          </button>
          <button
            id="delete-btn"
            data-testid="test-todo-delete-button"
            aria-label="Delete task"
          >
            🗑️
          </button>
        </div>
      </div>
      <div class="status-wrapper">
        <div class="statusDynamicBackground" data-testid="test-todo-priority-indicator" id="statusDynamicBackground">
          <span id="PriorityElement" class="todo-priority-high" data-testid="test-todo-priority">High</span>
        </div>

        <span id="todo-status" class="todo-status-pending" data-testid="test-todo-status">Pending</span>
        
        <span id="overdue-indicator" data-testid="test-todo-overdue-indicator" class="hidden">OVERDUE</span>

        <select data-testid="test-todo-status-control" name="" id="setStatus">
          <option value="">Set Status</option>
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Done">Done</option>
        </select>
      </div>

      <div id="collapsible-section" data-testid="test-todo-collapsible-section" class="collapsed">
        <p id="description" class="todo-description" data-testid="test-todo-description">
          Review the budget allocation with the finance team and update the
          timeline slides for the stakeholder meeting
        </p>
      </div>
      <button id="expand-toggle" data-testid="test-todo-expand-toggle" aria-expanded="false">Show More</button>

      <ul data-testid="test-todo-tags" class="task-tag-wrapper" role="list">
        <li data-testid="test-todo-tag-work">work</li>
        <li data-testid="test-todo-tag-urgent">urgent</li>
        <li data-testid="test-todo-tag-design">design</li>
      </ul>
      <div class="card-footer-section">
        <div class="time-section">
          <time
            id="time-due-date"
            class="todo-due-date"
            datetime="2026-04-20"
            data-testid="test-todo-due-date"
            >Due April 20, 2026</time
          >
          <time
            aria-live="polite"
            id="time-remaining"
            class="time-remaining"
            datetime=""
            data-testid="test-todo-time-remaining"
          ></time>
        </div>
        <div class="task-status-section">
          <label class="label-for-todo-complete" for="complete-checkbox"
            >Completed</label
          >
          <input
            aria-live="polite"
            id="complete-checkbox"
            class="checkbox"
            role="checkbox"
            data-testid="test-todo-complete-toggle"
            type="checkbox"
          />
        </div>
      </div>
    </article>

    <form class="hidden" id="form" action="" data-testid="test-todo-edit-form">
      <label for="edit-title">Title:</label>
      <input data-testid="test-todo-edit-title-input" type="text" id="edit-title" />
      
      <label for="edit-description">Description:</label>
      <textarea data-testid="test-todo-edit-description-input" id="edit-description"></textarea>
      
      <label for="edit-priority"> Priority: </label>
      <select data-testid="test-todo-edit-priority-select" id="edit-priority">
        <option value="">-- Select Priority --</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>
      <input data-testid="test-todo-edit-due-date-input" type="datetime-local" id="editDate" />
      <button data-testid="test-todo-save-button" id="edit-saveBtn">Save</button>
      <button data-testid="test-todo-cancel-button" id="edit-cancelBtn">Cancel</button>
    </form>
    <script src="script.js" defer></script>
  </body>
</html>
